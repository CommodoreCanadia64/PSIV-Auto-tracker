    <script>

    function initResizeHandles() {
        document.querySelectorAll('.panel').forEach(panel => {
        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        panel.appendChild(handle);

        handle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const startX = e.clientX;
            const startWidth = panel.offsetWidth;

            const onMove = (e) => {
                const newWidth = startWidth + (e.clientX - startX);
                panel.style.width = `${Math.max(150, newWidth)}px`;
            };

            const onUp = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
    });
}

    function applyCustomBg(input) {
        if (input.files && input.files[0]) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            
            // Apply directly to body as well as the CSS variable
            document.documentElement.style.setProperty('--bg-url', `url('${dataUrl}')`);
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('${dataUrl}')`;
            
            try {
                localStorage.setItem('ps4_custom_bg', dataUrl);
            } catch (err) {
                console.warn("Image too large to cache:", err);
            }
        };
        
        reader.readAsDataURL(input.files[0]);
    }
}

        function checkLogic(loc) {
    if (loc.id === "edge") {
        if (ringHuntActive) {
            const rings = ["Algo Ring", "Mota Ring", "Dezo Ring", "Palm Ring", "Rykr Ring"];
            return rings.every(ring => state[ring] === true);
        } else {
            const activeCount = Object.values(objState).filter(obj => obj.active === true).length;
            return activeCount === 8;
        }
    }

    // 1. Check specific requirements (req, reqs, either)
    if (loc.req && state[loc.req] !== true) return false;
    if (loc.either && !loc.either.some(r => state[r] === true)) return false;
    if (loc.reqs && !loc.reqs.every(r => state[r] === true)) return false;

    // 2. The Dezolis Gatekeeper logic
    if (loc.planet === 'dezolis') {
        // EXCEPTION LIST: Locations you can reach on foot without the Icedigger
        // Note: Using id.includes helps catch both standard and 'retrace-' versions
        const onFoot = (id) => id.includes('hanger') || id.includes('ryuon') || id.includes('raja');
        
        if (!onFoot(loc.id)) {
            if (state['Icedigger'] !== true) return false;
        }
    }

    return true;
}

        async function startAutotracker() {
    const led = document.getElementById('status-led');
    const statusText = document.getElementById('status-text');
    
    setInterval(async () => {
        try {
            const response = await fetch('http://localhost:8080/data');
            if (response.ok) {
                const newData = await response.json();
                
                // --- GLOBAL HOTKEY INTERCEPTORS ---
                if (newData["Remote_Toggle"] === true) {
                    toggleTimer(); // Starts or Stops the timer
                }
                if (newData["Remote_Reset"] === true) {
                    resetTimer();  // Resets the timer to 00:00:00
                }
                // ----------------------------------

                let changed = false;
                for (let key in newData) {
                    // Skip processing the volatile hotkey signals as permanent state flags
                    if (key === "Remote_Toggle" || key === "Remote_Reset") continue;

                    if (localStorage.getItem('persistent_' + key) === 'true') newData[key] = true;
                    if (newData[key] === true) localStorage.setItem('persistent_' + key, 'true');
                    if (state[key] !== newData[key]) {
                        state[key] = newData[key];
                        changed = true;
                    }
                }
                
                led.classList.add('connected');
                statusText.innerText = "Connected";
                if (changed) save();
            }
        } catch (err) {
            led.classList.remove('connected');
            statusText.innerText = "Disconnected";
        }
    }, 1000);
}

        function save() { 
            localStorage.setItem('ps4_state', JSON.stringify(state)); 
            if (ringHuntActive) {
                const rings = ["Algo Ring", "Mota Ring", "Dezo Ring", "Palm Ring", "Rykr Ring"];
                rings.forEach((ring, index) => {
                    if (objState[`obj-${index + 1}`]) objState[`obj-${index + 1}`].active = !!state[ring];
                });
                localStorage.setItem('ps4_objectives', JSON.stringify(objState));
                initObjectives();
            }
            render(); 
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                const txt = activeTab.innerText.toLowerCase();
                const target = txt.includes('all') ? 'all' : (txt.includes('space') ? 'space' : txt);
                switchMap(target, activeTab); 
            }
        }

        let startTime, elapsedTime = 0, timerInterval, isRunning = false;
        function toggleTimer() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTimer, 10);
                document.getElementById('timer-toggle').innerText = 'STOP';
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                document.getElementById('timer-toggle').innerText = 'START';
                isRunning = false;
            }
        }
        function resetTimer() { clearInterval(timerInterval); elapsedTime = 0; isRunning = false; document.getElementById('timer-display').innerText = '00:00:00'; document.getElementById('timer-toggle').innerText = 'START'; }
        function updateTimer() {
            elapsedTime = Date.now() - startTime;
            let time = new Date(elapsedTime);
            let h = String(Math.floor(elapsedTime / 3600000)).padStart(2, '0');
            let m = String(time.getUTCMinutes()).padStart(2, '0');
            let s = String(time.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }
        function handleGlobalKeys(e) { if (e.code === "Space" && e.target.tagName !== 'INPUT') { e.preventDefault(); toggleTimer(); } }

        }

        // --- THE FIXED TOGGLE ---
        const handleRightClick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (ringHuntActive && i <= 5) return;

            // 1. Flip the data boolean
            objState[key].active = !objState[key].active;
            
            // 2. Sync the class exactly to the new boolean
            if (objState[key].active) {
                div.classList.add('done');
            } else {
                div.classList.remove('done');
            }

            saveObjectives();
            save();
        };

        div.addEventListener('contextmenu', handleRightClick);
        input.addEventListener('contextmenu', handleRightClick);
        
        input.oninput = () => {
            objState[key].text = input.value;
            saveObjectives();
        };

        div.appendChild(input);
        container.appendChild(div);
    }
}
        function toggleObj(idx) {
    if (ringHuntActive && idx <= 5) return;
    const key = `obj-${idx}`;
    const cont = document.getElementById(`cont-${idx}`);
    
    if (!objState[key]) objState[key] = { text: '', active: false };
    
    // MASTER TOGGLE
    objState[key].active = !objState[key].active;
    
    if (cont) {
        if (objState[key].active) {
            cont.classList.add('done');
        } else {
            cont.classList.remove('done');
        }
    }
    
    saveObjectives();
    save(); // Force localstorage sync
}

function saveObjectives() {
    for (let i = 1; i <= 8; i++) {
        const input = document.getElementById(`obj-${i}`);
        const cont = document.getElementById(`cont-${i}`);
        if(input && cont) {
            // Update the text, but keep the 'active' state synced with the CSS class
            objState[`obj-${i}`] = { 
                text: input.value, 
                active: cont.classList.contains('done') 
            };
        }
    }
    localStorage.setItem('ps4_objectives', JSON.stringify(objState));
}
        function saveLocations() {
            locationsData.forEach(loc => { 
                const el = document.getElementById(`loc-${loc.id}`); 
                if (el) locState[loc.id] = el.value; 
            });
            localStorage.setItem('ps4_locations', JSON.stringify(locState));
            
            // HATE INEFFICIENCIES FIX:
            // Instead of a full render(), we just refresh the map tooltips
            // so your typing shows up instantly on the map pins.
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                const txt = activeTab.innerText.toLowerCase();
                const target = txt.includes('all') ? 'all' : (txt.includes('space') ? 'space' : txt);
                switchMap(target, activeTab); 
            }
        }

        async function resetTracker() {
    if (confirm("Reset everything?")) {
        try { 
            // Trigger the Python wipe
            await fetch('http://localhost:8080/reset', { method: 'POST' }); 
            console.log("Python sniffer reset triggered.");
        } catch (err) {
            console.error("Could not reach Python sniffer for reset:", err);
        }
        
        // Clear the browser's local memory
        ringHuntActive = false; 
        state = {}; objState = {}; locState = {}; clearedLocs = {};
        localStorage.clear();

        // UI Cleanup
        const ringBtn = document.querySelector('.mode-btn');
        if (ringBtn) ringBtn.classList.remove('active-mode');
        const objCont = document.getElementById('objectives-container');
        if (objCont) objCont.classList.remove('ring-hunt-layout');

        document.querySelectorAll('.loc-input').forEach(i => i.value = '');
        
        initObjectives(); 
        render(); 
        resetTimer();
        switchMap('all', document.getElementById('btn-all'));
    }
}

        window.onload = () => {
            const savedBg = localStorage.getItem('ps4_custom_bg');
if (savedBg) {
    document.documentElement.style.setProperty('--bg-url', `url('${savedBg}')`);
    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('${savedBg}')`;
}
            initResizeHandles();
            initObjectives(); 
            render(); 
            switchMap('all', document.getElementById('btn-all')); 
            startAutotracker(); 
        };
    </script>
