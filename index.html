        /* Container to pin both to the bottom-left of the glass panel */
#status-group {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);

#status-led {

#status-led.connected {

#status-text {

.map-pin {

.map-pin.cleared {

#map-resizer-wrap {
    display: block;

    height: 560px; 
    margin-bottom: 15px; 
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.8) !important;

    -webkit-backdrop-filter: blur(15px);

.map-box {

.bottom-panels {

    gap: 10px;

.panel { 
    background: rgba(10, 10, 10, 0.6) !important;

.resize-handle {
    position: absolute;
    top: 0;
    right: -4px;
    width: 8px;
    height: 100%;

    border-radius: 4px;

}

.resize-handle:hover {
    background: rgba(0, 229, 255, 0.3);

.locations-panel { flex: 1 1 auto !important; width: auto; resize: none; }
h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9em; color: #aaa; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 4px; }

.item { 
    width: 68px;

    cursor: pointer; 
    filter: grayscale(1) brightness(0.4); 
    transition: all 0.2s ease;

.item img { width: 60px; height: 60px; object-fit: contain; }

.counter { position: absolute; bottom: 8px; right: 4px; font-size: 14px; color: var(--accent); font-weight: bold; background: rgba(0,0,0,0.6); padding: 0 2px; }

.obj-container.done {

/* Linked objective - golden left border when active */
.obj-container.linked:not(.done) {

.obj-input {

let wonderModeActive = false; // Add this with your other global state variables

    wonderModeActive = !wonderModeActive;
    const btn = document.getElementById('wonder-mode-btn');
    if (btn) btn.classList.toggle('active-mode', wonderModeActive);
    initObjectives();
     // Refresh to apply/remove masking
}

// Also map boss location names from Bosses section -> cleared keys
// This handles objectives like "Weapon Boss" by cross-referencing the bosses list
const BOSS_LOCATION_MAP = {

};

function parseSpoilerFile(text) {
    const result = {
        seed: null,
        flagString: null,
        objectives: [],         // Array of { text, locId, clearedKey } up to 8
        bosses: {},             // { locationName: bossName }
    };

    const lines = text.split('\n');
    let section = null;

    for (let i = 0; i < lines.length; i++) {
        const raw = lines[i];
        const line = raw.trim();

        // Parse header fields
        if (line.startsWith('Seed #:')) {
            result.seed = line.replace('Seed #:', '').trim();
            continue;
        }
        if (line.startsWith('Flag String:')) {
            result.flagString = line.replace('Flag String:', '').trim();
            continue;
        }

        // Section detection
        if (line === 'Objectives:') { section = 'objectives'; continue; }
        if (line === 'Treasures:')  { section = 'treasures'; continue; }
        if (line === 'Bosses:')     { section = 'bosses'; continue; }
        if (line === 'Party:')      { section = 'party'; continue; }

       
if (section === 'objectives' && line !== '') {
    result.objectives.push({
        text: line,
        locId: null,
        clearedKey: null,
    });
}

// Parse Bosses section
else if (section === 'bosses' && line.includes('-->')) {
    const parts = line.split('-->');
    if (parts.length === 2) {
        const locName = parts[0].trim().toLowerCase();
        const bossName = parts[1].trim();
        result.bosses[locName] = bossName;
    }
}

        // Parse Bosses section: " Location Name --> Boss Name"
        if (section === 'bosses' && line.includes('-->')) {
            const parts = line.split('-->');
            if (parts.length === 2) {
                const locName = parts[0].trim().toLowerCase();
                const bossName = parts[1].trim();
                result.bosses[locName] = bossName;
            }
        }
    }
    // Resolve objectives after Bosses section has been parsed
for (const objective of result.objectives) {
    const mapping = resolveObjectiveMapping(
        objective.text,
        result.bosses
    );

    if (mapping) {
        objective.locId = mapping.locId;
        objective.clearedKey = mapping.clearedKey;
    }
}

    return result;
}

function resolveObjectiveMapping(objName, bosses = null) {
    const key = objName.toLowerCase().trim();

    // Direct objective/location mapping
    if (OBJECTIVE_LOCATION_MAP[key]) {
        return OBJECTIVE_LOCATION_MAP[key];
    }

    // Boss objective mapping
    if (bosses) {
        for (const [locationName, bossName] of Object.entries(bosses)) {
            if (bossName.toLowerCase().trim() === key) {
                const locationMapping =
                    OBJECTIVE_LOCATION_MAP[locationName];

                if (locationMapping) {
                    return locationMapping;
                }
            }
        }
    }

    // Fuzzy matching fallback
    for (const mapKey of Object.keys(OBJECTIVE_LOCATION_MAP)) {
        if (key.includes(mapKey) || mapKey.includes(key)) {
            return OBJECTIVE_LOCATION_MAP[mapKey];
        }
    }

    return null;
}

function loadSpoilerFile(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        const text = e.target.result;
        spoilerData = parseSpoilerFile(text);
        localStorage.setItem('ps4_spoiler', JSON.stringify(spoilerData));

        // Pre-populate objectives from spoiler
        populateObjectivesFromSpoiler();

        // Update UI
        updateSeedDisplay();
        initObjectives();
        render();
        save();

        // Update button style
        const btn = document.getElementById('seed-select-btn');
        if (btn) btn.classList.add('seed-loaded');
    };
    reader.readAsText(file);
    // Reset input so same file can be re-selected
    input.value = '';
}

function populateObjectivesFromSpoiler() {
    if (!spoilerData || !spoilerData.objectives) return;

    // Reset objState and populate from spoiler objectives
    // Preserve existing 'active' flags, only update text & link data
    for (let i = 0; i < 8; i++) {
        const key = `obj-${i + 1}`;
        const spoilerObj = spoilerData.objectives[i];
        if (spoilerObj) {
            const wasActive = objState[key] ? objState[key].active : false;
            objState[key] = {
                text: spoilerObj.text,
                active: wasActive,
                locId: spoilerObj.locId,
                clearedKey: spoilerObj.clearedKey,
                linked: !!(spoilerObj.locId),
            };
        } else {
            // Pad remaining slots as empty
            if (!objState[key]) {
                objState[key] = { text: '', active: false, linked: false };
            }
        }
    }
    localStorage.setItem('ps4_objectives', JSON.stringify(objState));
}

function updateSeedDisplay() {
    const bar = document.getElementById('seed-info-bar');
    const numEl = document.getElementById('seed-num-display');
    const flagEl = document.getElementById('seed-flag-display');
    const label = document.getElementById('obj-seed-label');

    if (spoilerData && spoilerData.seed) {
        numEl.textContent = spoilerData.seed;
        flagEl.textContent = spoilerData.flagString || '—';
        bar.classList.add('visible');
        if (label) label.textContent = `Seed ${spoilerData.seed}`;
        // Mark seed button as loaded
        const btn = document.getElementById('seed-select-btn');
        if (btn) btn.classList.add('seed-loaded');
    } else {
        bar.classList.remove('visible');
        if (label) label.textContent = '';
        const btn = document.getElementById('seed-select-btn');
        if (btn) btn.classList.remove('seed-loaded');
    }
}

// Check if any linked objectives should be auto-completed based on game state
function syncLinkedObjectives() {
    let changed = false;
    for (let i = 1; i <= 8; i++) {
        const key = `obj-${i}`;
        const obj = objState[key];
        if (!obj || !obj.clearedKey) continue;

        // If the linked location cleared flag is true, auto-complete the objective
        const isCleared = state[obj.clearedKey] === true;
        if (isCleared && !obj.active) {
            obj.active = true;
            changed = true;
        }
    }
    if (changed) {
        localStorage.setItem('ps4_objectives', JSON.stringify(objState));
        initObjectives();
    }
}

            e.preventDefault();
            const startX = e.clientX;
            const startWidth = panel.offsetWidth;
            const onMove = (e) => { panel.style.width = `${Math.max(150, startWidth + (e.clientX - startX))}px`; };
            const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
    });

        function checkLogic(loc) {
    if (loc.id === "edge") {
        if (ringHuntActive) {
            const rings = ["Algo Ring", "Mota Ring", "Dezo Ring", "Palm Ring", "Rykr Ring"];
            return rings.every(ring => state[ring] === true);
        } else {
            const activeCount = Object.values(objState).filter(obj => obj.active === true).length;
            return activeCount === 8;
        }
    }
    if (loc.req && state[loc.req] !== true) return false;
    if (loc.either && !loc.either.some(r => state[r] === true)) return false;
    if (loc.reqs && !loc.reqs.every(r => state[r] === true)) return false;
    if (loc.planet === 'dezolis') {
        const onFoot = (id) => id.includes('hanger') || id.includes('ryuon') || id.includes('raja');
        if (!onFoot(loc.id)) {
            if (state['Icedigger'] !== true) return false;
        }
    }
    return true;
}

        if (item.name === 'ambereye') val = state['ambereye_count'] || 0;
        else val = state[item.name] || (item.type === 'Toggle' ? false : 0);

        img.src = item.img;

        if (item.type === 'consumable') {

            c.className = 'counter';
            c.innerText = val;
            div.appendChild(c);
        }
        div.onclick = () => {
            if (item.type === 'Toggle') state[item.name] = !state[item.name];

    locsCont.innerHTML = '';

            'wreckage': "Wreckage_Cleared", 'vahal': "VahalFort_Cleared", 'molcum': "Molcum_Cleared", 'valley': "ValleyMaze_Cleared",
            'tonoe': "Tonoe_Cleared", 'soldiers': "SoldiersIsland_Cleared", 'monsen': "Monsen_Cleared", 'plate': "PlateSystem_Cleared",
            'ladea': "LadeaTower_Cleared", 'rappy': "RappyCave_Cleared", 'zelan': "Zelan_Cleared", 'myst': "MystVale_Cleared",
            'climate': "ClimateControl_Cleared", 'reshel': "Reshel_Cleared", 'garuberk': "GaruberkTower_Cleared",
            'esper': "EsperMansion_Cleared", 'gumbious': "GumbiousTemple_Cleared", 'weapon': "WeaponPlant_Cleared",
            'courage': "TowerofCourage_Cleared", 'anger': "TowerofAnger_Cleared", 'kuran': "Kuran_Cleared",
            'air_castle': "AirCastle_Cleared", 'passageway': "Passageway_Cleared", 'zelan_space': "Zelan_Cleared",
            'air_castle_basement': "AirCastleBasement_Cleared", 'retrace-nalya': 'Nalya_Entered',
            'retrace-uzo': 'Uzo_Entered', 'retrace-torinco': 'Torinco_Entered',
            'retrace-termi': 'Termi_Entered', 'retrace-krup': 'Krup_Entered',
            'retrace-ryuon': 'Ryuon_Entered', 'retrace-raja': 'Raja_Entered',
            'retrace-zosa': 'Zosa_Entered', 'retrace-meese': 'Meese_Entered',
            'retrace-jut': 'Jut_Entered'
        };
        const autoKey = autoClearMapping[loc.id];
        const isAutoCleared = autoKey ? state[autoKey] === true : false;
        const isRetrance = loc.isRetrance === true;
        container.className = `loc-container loc-${loc.planet} ${isAutoCleared ? 'auto-cleared' : ''} ${isRetrance ? 'retrace-only' : ''}`;
        const title = document.createElement('div');
        title.className = 'loc-title';
        title.innerHTML = loc.title + (isAutoCleared ? ' <span style="color: red;">(DONE)</span>' : '');
        const input = document.createElement('input');
        input.className = 'loc-input';
        input.id = `loc-${loc.id}`;
        input.value = locState[loc.id] || '';
        input.placeholder = isRetrance ? 'Notes...' : (isAutoCleared ? 'Cleared' : 'Notes...');
        input.oninput = () => saveLocations();
        container.appendChild(title);
        container.appendChild(input);
        locsCont.appendChild(container);
    });
}

            container.innerHTML = '';

                box.style.aspectRatio = `${dim.w} / ${dim.h}`;

                locationsData.filter(l => l.planet === p).forEach(l => {
                    const pin = document.createElement('div');
                    const autoClearMapping = { 
                        'silence': 'Silence_Cleared', 'aiedo': 'Aiedo_Cleared', 'strength': 'Strength_Cleared', 'hanger': 'Hanger_Cleared',
                        'kadary': "Kadary_Cleared", 'ziofort': "ZiosFort_Cleared", 'nurvus': "Nurvus_Cleared", 'mile': "Mile_Cleared",
                        'edge': "TheEdge_Cleared", 'piata': "Piata_Cleared", 'birth': "BirthValley_Cleared", 'bio': "BioPlant_Cleared",
                        'wreckage': "Wreckage_Cleared", 'vahal': "VahalFort_Cleared", 'molcum': "Molcum_Cleared", 'valley': "ValleyMaze_Cleared",
                        'tonoe': "Tonoe_Cleared", 'soldiers': "SoldiersIsland_Cleared", 'monsen': "Monsen_Cleared", 'plate': "PlateSystem_Cleared",
                        'ladea': "LadeaTower_Cleared", 'rappy': "RappyCave_Cleared", 'zelan': "Zelan_Cleared", 'myst': "MystVale_Cleared",
                        'climate': "ClimateControl_Cleared", 'reshel': "Reshel_Cleared", 'garuberk': "GaruberkTower_Cleared",
                        'esper': "EsperMansion_Cleared", 'gumbious': "GumbiousTemple_Cleared", 'weapon': "WeaponPlant_Cleared",
                        'courage': "TowerofCourage_Cleared", 'anger': "TowerofAnger_Cleared", 'kuran': "Kuran_Cleared",
                        'air_castle': "AirCastle_Cleared", 'passageway': "Passageway_Cleared", 'zelan_space': "Zelan_Cleared",
                        'air_castle_basement': "AirCastleBasement_Cleared", 'retrace-nalya': 'Nalya_Entered',
                        'retrace-uzo': 'Uzo_Entered', 'retrace-torinco': 'Torinco_Entered',
                        'retrace-termi': 'Termi_Entered', 'retrace-krup': 'Krup_Entered',
                        'retrace-ryuon': 'Ryuon_Entered', 'retrace-raja': 'Raja_Entered',
                        'retrace-zosa': 'Zosa_Entered', 'retrace-meese': 'Meese_Entered',
                        'retrace-jut': 'Jut_Entered'
                    };
                    const autoKey = autoClearMapping[l.id];
const isAutoCleared = autoKey ? (state[autoKey] === true) : false;
const isCleared = clearedLocs[l.id] || isAutoCleared;
const isAccessible = checkLogic(l);
const isRetrance = l.isRetrance === true;

let logicClass = "";
const hasPrism = state["AeroPrism"] === true;

if (isCleared) {
    logicClass = 'cleared';
} else if (l.id === "air_castle") {
    logicClass = hasPrism ? 'accessible' : 'orange';
} else {
    logicClass = isAccessible ? 'accessible' : 'locked';
}

const pinSize = target === 'all' ? 'pin-sm' : 'pin-lg';
pin.className = `map-pin ${logicClass} ${isRetrance ? 'retrace-only' : ''} ${pinSize}`;

if (!l.isRetrance && l.totalChests > 0) {
    const associatedChests = locationChestRegistry[l.id];
    if (associatedChests) {
        let openedCount = 0;
        associatedChests.forEach(key => { if (state[key] === true) openedCount++; });
        let remaining = l.totalChests - openedCount;
        if (remaining <= 0) {
            pin.innerText = "✓";
            logicClass = 'cleared';
        } else {
            pin.innerText = remaining;
        }
    } else {
        pin.innerText = l.totalChests;
    }
}
pin.style.left = `${(l.x / dim.w) * 100}%`; 
pin.style.top = `${(l.y / dim.h) * 100}%`;

let tooltipText = "";
const userNote = locState[l.id] || "";
const isRetranceModeActive = document.body.classList.contains('show-retrace');

let reqParts = [];
if (l.req) reqParts.push(`Requirements: ${l.req}`);
if (l.reqs) reqParts.push(`Requirements: ${l.reqs.join(' + ')}`);
if (l.either) reqParts.push(`Requirements: Either: ${l.either.join(' or ')}`);
let requirementsString = reqParts.length > 0 ? reqParts.join(' | ') : 'No Requirements';

let chestInfo = l.totalChests ? `Chests: ${l.totalChests}` : "";

if (isRetranceModeActive) {
    tooltipText = `ACTUALLY: ${userNote || "???"}`;
    if (chestInfo) tooltipText += `\n${chestInfo}`;
    if (reqParts.length > 0) tooltipText += `\n(${requirementsString})`;
} else {
    tooltipText = requirementsString;
    if (chestInfo) tooltipText = `${chestInfo}\n${tooltipText}`;
    if (userNote.trim() !== "") tooltipText += `\nNote: ${userNote}`;
}

// Show boss name from spoiler if available
if (spoilerData && spoilerData.bosses) {
    const bossKey = l.title.toLowerCase().replace("'", "");
    const altKeys = [l.id.replace(/_/g, ' ')];
    let bossName = spoilerData.bosses[bossKey];
    if (!bossName) {
        for (const ak of altKeys) {
            bossName = spoilerData.bosses[ak];
            if (bossName) break;
        }
    }
    if (bossName) tooltipText += `\nBoss: ${bossName}`;
}

pin.title = `${l.title}\n${tooltipText}`;

                    pin.onclick = (e) => {
                        e.stopPropagation();
                        if (!isRetrance && !isAccessible && !isCleared) return;
                        clearedLocs[l.id] = !clearedLocs[l.id];
                        localStorage.setItem('ps4_cleared', JSON.stringify(clearedLocs));
                        switchMap(target, btn);
                    };
                    box.appendChild(pin);
                });
            });

        async function startAutotracker() {
    const led = document.getElementById('status-led');
    const statusText = document.getElementById('status-text');
    
    setInterval(async () => {
        try {
            const response = await fetch('http://localhost:8080/data');
            if (response.ok) {
                const newData = await response.json();
                
                if (newData["Remote_Toggle"] === true) toggleTimer();
                if (newData["Remote_Reset"] === true) resetTimer();

                let changed = false;
                for (let key in newData) {
                    if (key === "Remote_Toggle" || key === "Remote_Reset") continue;
                    if (localStorage.getItem('persistent_' + key) === 'true') newData[key] = true;
                    if (newData[key] === true) localStorage.setItem('persistent_' + key, 'true');
                    if (state[key] !== newData[key]) {
                        state[key] = newData[key];
                        changed = true;
                    }
                }
                
                led.classList.add('connected');
                statusText.innerText = "Connected";
                if (changed) save();
            }
        } catch (err) {
            led.classList.remove('connected');
            statusText.innerText = "Disconnected";
        }
    }, 500);
}

        function save() { 
            localStorage.setItem('ps4_state', JSON.stringify(state)); 

            // Auto-sync linked objectives when game state changes
            syncLinkedObjectives();

            if (ringHuntActive) {
                const rings = ["Algo Ring", "Mota Ring", "Dezo Ring", "Palm Ring", "Rykr Ring"];
                rings.forEach((ring, index) => {
                    if (objState[`obj-${index + 1}`]) objState[`obj-${index + 1}`].active = !!state[ring];
                });
                localStorage.setItem('ps4_objectives', JSON.stringify(objState));
                initObjectives();
            }
            render(); 
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                const txt = activeTab.innerText.toLowerCase();
                const target = txt.includes('all') ? 'all' : (txt.includes('space') ? 'space' : txt);
                switchMap(target, activeTab); 
            }
        }

        function setRingHuntMode() {
    ringHuntActive = !ringHuntActive;
    const btn = document.querySelector('.mode-btn');
    if (btn) {
        btn.classList.toggle('active-mode', ringHuntActive);
        btn.style.backgroundColor = "";
        btn.style.color = "";
    }
    initObjectives();
    render();
    const rings = ["Algo Ring", "Mota Ring", "Dezo Ring", "Palm Ring", "Rykr Ring"];
    rings.forEach((ring, i) => {
        const idx = i + 1;
        objState[`obj-${idx}`] = ringHuntActive ? { text: ring, active: !!state[ring] } : { text: '', active: false };
    });
    localStorage.setItem('ps4_objectives', JSON.stringify(objState));
    initObjectives();
    render();
}

        let startTime, elapsedTime = 0, timerInterval, isRunning = false;
        function toggleTimer() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTimer, 10);
                document.getElementById('timer-toggle').innerText = 'STOP';
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                document.getElementById('timer-toggle').innerText = 'START';
                isRunning = false;
            }
        }
        function resetTimer() { clearInterval(timerInterval); elapsedTime = 0; isRunning = false; document.getElementById('timer-display').innerText = '00:00:00'; document.getElementById('timer-toggle').innerText = 'START'; }
        function updateTimer() {
            elapsedTime = Date.now() - startTime;
            let h = String(Math.floor(elapsedTime / 3600000)).padStart(2, '0');
            let m = String(Math.floor((elapsedTime % 3600000) / 60000)).padStart(2, '0');
            let s = String(Math.floor((elapsedTime % 60000) / 1000)).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }
        function handleGlobalKeys(e) { if (e.code === "Space" && e.target.tagName !== 'INPUT') { e.preventDefault(); toggleTimer(); } }

        function initObjectives() {
    const container = document.getElementById('objectives-container');
    if (!container) return;

    if (ringHuntActive) container.classList.add('ring-hunt-layout');
    else container.classList.remove('ring-hunt-layout');

    container.innerHTML = '';

    for (let i = 1; i <= 8; i++) {
        const key = `obj-${i}`;
        if (!objState[key]) objState[key] = { text: '', active: false };
        const data = objState[key];

        // 1. Determine if this specific objective should be masked
        const isWonderMasked = wonderModeActive && !data.active;

        const div = document.createElement('div');
        const isLinked = !!(data.clearedKey);
        
        // 2. Add the 'wonder-masked' class if applicable
        div.className = `obj-container ${data.active ? 'done' : ''} ${isLinked ? 'linked' : ''} ${isWonderMasked ? 'wonder-masked' : ''}`;
        div.id = `cont-${i}`;

        // Tooltip showing which location this objective is linked to
        if (isLinked && data.locId) {
            div.title = `Auto-tracks: ${data.locId} (${data.clearedKey})`;
        }

        const input = document.createElement('input');
        input.className = 'obj-input';
        input.id = `obj-${i}`;
        input.value = data.text;
        input.placeholder = `Objective ${i}...`;

        // 3. Set readOnly and cursor status based on both Ring Hunt and Wonder Mode
        input.readOnly = isWonderMasked || (ringHuntActive && i <= 5);
        input.style.cursor = input.readOnly ? 'default' : 'text';

        // ... rest of your existing function code ...

        if (ringHuntActive && i <= 5) {
            input.readOnly = true;
            input.style.cursor = 'default';
        }

        const handleRightClick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (ringHuntActive && i <= 5) return;
            // Don't allow un-clearing auto-cleared objectives
            if (data.clearedKey && state[data.clearedKey] === true && !data.active) return;
            objState[key].active = !objState[key].active;
            if (objState[key].active) div.classList.add('done');
            else div.classList.remove('done');
            saveObjectives();
            save();
        };

        div.addEventListener('contextmenu', handleRightClick);
        input.addEventListener('contextmenu', handleRightClick);
        
        input.oninput = () => {
            // Only update display text — the tracking link (clearedKey/locId) is
            // locked in when the spoiler is loaded and never changed by typing.
            objState[key].text = input.value;
            saveObjectives();
        };

        div.appendChild(input);
        container.appendChild(div);
    }
}

        function toggleObj(idx) {
    if (ringHuntActive && idx <= 5) return;
    const key = `obj-${idx}`;
    const cont = document.getElementById(`cont-${idx}`);
    if (!objState[key]) objState[key] = { text: '', active: false };
    objState[key].active = !objState[key].active;
    if (cont) {
        if (objState[key].active) cont.classList.add('done');
        else cont.classList.remove('done');
    }
    saveObjectives();
    save();
}

function saveObjectives() {
    for (let i = 1; i <= 8; i++) {
        const input = document.getElementById(`obj-${i}`);
        const cont = document.getElementById(`cont-${i}`);
        if (input && cont) {
            // Preserve locId and clearedKey when saving
            const existing = objState[`obj-${i}`] || {};
            objState[`obj-${i}`] = { 
                text: input.value, 
                active: cont.classList.contains('done'),
                locId: existing.locId || null,
                clearedKey: existing.clearedKey || null,
                linked: existing.linked || false,
            };
        }
    }
    localStorage.setItem('ps4_objectives', JSON.stringify(objState));
}

        function saveLocations() {
            locationsData.forEach(loc => { 
                const el = document.getElementById(`loc-${loc.id}`); 
                if (el) locState[loc.id] = el.value; 
            });
            localStorage.setItem('ps4_locations', JSON.stringify(locState));
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                const txt = activeTab.innerText.toLowerCase();
                const target = txt.includes('all') ? 'all' : (txt.includes('space') ? 'space' : txt);
                switchMap(target, activeTab); 
            }
        }

        async function resetTracker() {
    if (!confirm("Reset tracker and unload the current seed?")) {
        return;
    }

    try {
        await fetch('http://localhost:8080/reset', {
            method: 'POST'
        });
    } catch (err) {
        console.error(
            "Could not reach Python sniffer for reset:",
            err
        );
    }

    ringHuntActive = false;

    state = {};
    locState = {};
    clearedLocs = {};
    objState = {};

    spoilerData = null;

    localStorage.removeItem('ps4_state');
    localStorage.removeItem('ps4_locations');
    localStorage.removeItem('ps4_cleared');
    localStorage.removeItem('ps4_objectives');
    localStorage.removeItem('ps4_spoiler');

    Object.keys(localStorage).forEach(k => {
        if (k.startsWith('persistent_')) {
            localStorage.removeItem(k);
        }
    });

    const ringBtn = document.querySelector('.mode-btn');
    if (ringBtn) {
        ringBtn.classList.remove('active-mode');
    }

    const objCont =
        document.getElementById('objectives-container');

    if (objCont) {
        objCont.classList.remove('ring-hunt-layout');
    }

    const seedBtn =
        document.getElementById('seed-select-btn');

    if (seedBtn) {
        seedBtn.classList.remove('seed-loaded');
    }

    document
        .querySelectorAll('.loc-input')
        .forEach(i => i.value = '');

    updateSeedDisplay();

    initObjectives();
    render();
    resetTimer();

    switchMap(
        'all',
        document.getElementById('btn-all')
    );
}

        window.onload = () => {
            const savedBg = localStorage.getItem('ps4_custom_bg');
            if (savedBg) {
                document.documentElement.style.setProperty('--bg-url', `url('${savedBg}')`);
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('${savedBg}')`;
            }

            // Restore spoiler data and seed display
            if (spoilerData) {
                updateSeedDisplay();
                // If objState is empty or doesn't have linked data, re-populate from spoiler
                const hasLinkedObjs = Object.values(objState).some(o => o && o.clearedKey);
                if (!hasLinkedObjs && spoilerData.objectives && spoilerData.objectives.length > 0) {
                    populateObjectivesFromSpoiler();
                }
            }

            initResizeHandles();
            initObjectives(); 
            render(); 
            switchMap('all', document.getElementById('btn-all')); 
            startAutotracker(); 
        };
